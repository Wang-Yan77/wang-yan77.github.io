<script src="assets/js/main.min.js"></script>
<script>
  (function () {
    var key = "site-language";
    var root = document.documentElement;
    var switcher;

    function applyLanguage(lang) {
      var normalized = lang === "en" ? "en" : "zh";
      root.setAttribute("data-lang", normalized);
      root.setAttribute("lang", normalized === "en" ? "en" : "zh-CN");
      localStorage.setItem(key, normalized);

       if (switcher) {
        switcher.value = normalized;
      }
    }

    document.addEventListener("DOMContentLoaded", function () {
      switcher = document.getElementById("lang-switcher");

      var saved = localStorage.getItem(key);
      applyLanguage(saved || "zh");

      if (switcher) {
        switcher.addEventListener("change", function (event) {
          applyLanguage(event.target.value);
        });
      }
    });
  })();
</script>
