<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="#about-me" target="_self">
              <span class="lang-zh">首页</span>
              <span class="lang-en">Home</span>
            </a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{{ link.url }}" target="_self">
                <span class="lang-zh">{{ link.title_zh | default: link.title }}</span>
                <span class="lang-en">{{ link.title_en | default: link.title }}</span>
              </a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
    <div class="masthead__lang">
      <label class="screen-reader-text" for="lang-switcher">Language</label>
      <select id="lang-switcher" class="lang-switcher-select" aria-label="Language">
        <option value="zh">中文</option>
        <option value="en">English</option>
      </select>
    </div>
  </div>
</div>
