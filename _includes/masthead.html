<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav class="top-nav" aria-label="Primary">
        <ul class="top-nav__links">
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{{ link.url }}" target="_self">
                <span class="lang-zh">{{ link.title_zh | default: link.title }}</span>
                <span class="lang-en">{{ link.title_en | default: link.title }}</span>
              </a>
            </li>
          {% endfor %}
        </ul>
      </nav>
    </div>
    <div class="masthead__lang">
      <button id="lang-switcher" class="lang-switcher-btn" type="button" aria-label="Switch language">EN</button>
    </div>
  </div>
</div>
