<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg masthead__menu-home-item">
            <a href="#about-me" target="_self">
              <span class="lang-zh">首页</span>
              <span class="lang-en">Home</span>
            </a>
          </li>
          {% for link in site.data.navigation.main %}
            <li class="masthead__menu-item">
              <a href="{{ link.url }}" target="_self">
                <span class="lang-zh">{{ link.title_zh | default: link.title }}</span>
                <span class="lang-en">{{ link.title_en | default: link.title }}</span>
              </a>
            </li>
          {% endfor %}
          <li class="masthead__menu-item lang-toggle-item">
            <button id="lang-switcher" class="lang-switcher" type="button" aria-label="Switch Language">
              <span class="lang-zh">EN</span>
              <span class="lang-en">中文</span>
            </button>
          </li>
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
    </div>
  </div>
</div>
